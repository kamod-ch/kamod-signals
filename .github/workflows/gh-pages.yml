name: Deploy docs to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build docs
        run: pnpm docs:build

      - name: Add Matomo image tracker
        run: |
          python3 <<'PY'
          from pathlib import Path

          snippet = '''<!-- Matomo Image Tracker-->
          <img referrerpolicy="no-referrer-when-downgrade" src="https://matomo.kamod.ch/matomo.php?idsite=8&amp;rec=1"
          style="border:0" alt="" />

          <!-- End Matomo -->'''

          for html_file in Path('docs/dist').rglob('*.html'):
              html = html_file.read_text(encoding='utf-8')
              if 'matomo.kamod.ch/matomo.php?idsite=8' in html:
                  continue
              if '</body>' in html:
                  html = html.replace('</body>', f'{snippet}\n</body>', 1)
              else:
                  html = f'{html}\n{snippet}\n'
              html_file.write_text(html, encoding='utf-8')
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
